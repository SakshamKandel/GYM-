# Android release APK - CI build for the Expo app.
#
# The native android/ project is NOT committed - this repo uses Expo Continuous
# Native Generation (see .gitignore: apps/mobile/android/ + apps/mobile/ios/ are
# generated). CI regenerates android/ from app.json with `expo prebuild`, then
# builds a minified release APK (arm64-v8a) with the production API URL baked
# in. Bytes never go through EAS - this builds on the GitHub runner with Gradle,
# so there is no Expo-account queue or build-credit limit. (If you ever prefer
# Expo's cloud builders: `eas build -p android --profile production
# --non-interactive` with an EXPO_TOKEN secret is the drop-in alternative.)
#
# pnpm version comes from package.json "packageManager" - do NOT also pass
# `version:` to pnpm/action-setup (the action errors on a double spec).
#
# REQUIRED repository secrets (Settings -> Secrets and variables -> Actions):
#   GOOGLE_SERVICES_JSON_B64  base64 of apps/mobile/google-services.json
#     (restored BEFORE prebuild; app.json android.googleServicesFile references
#      it, so prebuild copies it into the generated android/app/ module)
#   ANDROID_KEYSTORE_B64      base64 of apps/mobile/android/app/debug.keystore
#     (must be the SAME keystore every build: Android updates require a stable
#      signature, and the Google OAuth Android client is bound to its SHA-1.
#      The release build type signs with signingConfigs.debug = this keystore,
#      so it overwrites the throwaway one prebuild generates.)
# REQUIRED repository variable (Settings -> Secrets and variables -> Actions):
#   GOOGLE_ANDROID_CERT_SHA1  SHA-1 registered on the Android OAuth client for
#     package com.gmmethod.gymtracker. CI rejects a changed signing key.
#
# Generate both values locally (PowerShell):
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("apps/mobile/google-services.json")) | Set-Clipboard
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("apps/mobile/android/app/debug.keystore")) | Set-Clipboard

name: android-build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/android-build.yml'
    tags: ['v*']

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Safe-to-ship public identifiers (already embedded in every shipped APK).
  EXPO_PUBLIC_API_URL: https://gym-xi-tawny.vercel.app
  EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 211501755130-7vppq78cbu2hg3nj3nb2eau4ug72njfd.apps.googleusercontent.com
  EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: 211501755130-0udbbdmtor3mn6q6ssthm0eug46o80da.apps.googleusercontent.com
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  build:
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      - run: pnpm install --frozen-lockfile

      # google-services.json must exist BEFORE prebuild: app.json's
      # android.googleServicesFile points at it, and prebuild copies it into the
      # generated android/app/ module. (Guard both secrets up front here too.)
      - name: Restore google-services.json from secret
        shell: bash
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$GS_B64" ] || [ -z "$KS_B64" ]; then
            echo "::error::Missing repo secrets GOOGLE_SERVICES_JSON_B64 and/or ANDROID_KEYSTORE_B64 - see the header of this workflow file for how to generate them."
            exit 1
          fi
          echo "$GS_B64" | base64 -d > apps/mobile/google-services.json

      # The native android/ project is gitignored (Continuous Native
      # Generation) - regenerate it from app.json on the runner.
      - name: Prebuild native android project
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild -p android --no-install

      # prebuild drops a throwaway template debug.keystore; overwrite it with
      # our stable release keystore (SHA-1 bound to the Google OAuth client).
      - name: Install stable release keystore
        shell: bash
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$KS_B64" | base64 -d > apps/mobile/android/app/debug.keystore
          # Safety net in case prebuild's googleServicesFile copy is skipped.
          echo "$GS_B64" | base64 -d > apps/mobile/android/app/google-services.json

      - name: Verify Google OAuth build identity
        shell: bash
        env:
          EXPECTED_SHA1: ${{ vars.GOOGLE_ANDROID_CERT_SHA1 }}
        run: |
          if [ -z "$EXPECTED_SHA1" ]; then
            echo "::error::Missing repository variable GOOGLE_ANDROID_CERT_SHA1."
            exit 1
          fi

          ACTUAL_SHA1="$(keytool -list -v \
            -keystore apps/mobile/android/app/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android \
            | sed -n 's/^[[:space:]]*SHA1: //p' \
            | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          NORMALIZED_EXPECTED="$(printf '%s' "$EXPECTED_SHA1" \
            | tr -d ':' | tr '[:upper:]' '[:lower:]')"

          if [ -z "$ACTUAL_SHA1" ] || [ "$ACTUAL_SHA1" != "$NORMALIZED_EXPECTED" ]; then
            echo "::error::Release keystore SHA-1 does not match the Android OAuth credential."
            exit 1
          fi

          node <<'NODE'
          const app = require('./apps/mobile/app.json');
          const services = require('./apps/mobile/google-services.json');
          const web = process.env.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID ?? '';
          const android = process.env.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID ?? '';
          const suffix = '.apps.googleusercontent.com';
          const packageName = app.expo?.android?.package;
          const configuredPackages = (services.client ?? []).map(
            (client) => client.client_info?.android_client_info?.package_name,
          );

          if (!web.endsWith(suffix) || !android.endsWith(suffix)) {
            throw new Error('Google OAuth client IDs are missing or malformed');
          }
          if (web.split('-', 1)[0] !== android.split('-', 1)[0]) {
            throw new Error('Google web and Android OAuth clients belong to different projects');
          }
          if (packageName !== 'com.gmmethod.gymtracker' || !configuredPackages.includes(packageName)) {
            throw new Error('Google services package does not match the Android application id');
          }
          NODE

      # Expo prebuild writes org.gradle.jvmargs=-Xmx2048m, which intermittently
      # OOMs :app:packageRelease (IncrementalSplitterRunnable) when R8 minify +
      # shrinkResources + Skia/native libs are all in play. ubuntu-latest has
      # 16 GB, so give the build JVM a comfortable heap for deterministic
      # packaging. (android/ is regenerated each run, so patch it here.)
      - name: Raise Gradle heap for release packaging
        shell: bash
        run: |
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8/' apps/mobile/android/gradle.properties
          grep '^org.gradle.jvmargs=' apps/mobile/android/gradle.properties

      - name: Build release APK (arm64-v8a)
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          # Sanitize ref name: branch names may contain '/' (e.g. ci/foo), which
          # would otherwise make cp target a non-existent subdirectory.
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
             "dist/gym-tracker-${SAFE_REF}-r${GITHUB_RUN_NUMBER}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: gym-tracker-apk
          path: dist/*.apk
          retention-days: 30

      - name: Prepare release metadata
        id: release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./apps/mobile/app.json').expo.version")"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
            RELEASE_NAME="GYM Tracker $GITHUB_REF_NAME"
          else
            RELEASE_TAG="v${APP_VERSION}-r${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="GYM Tracker v${APP_VERSION} (release ${GITHUB_RUN_NUMBER})"
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      # Main and version-tag builds publish the verified APK as the latest
      # GitHub Release; workflow_dispatch on another branch remains artifact-only.
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: dist/*.apk
